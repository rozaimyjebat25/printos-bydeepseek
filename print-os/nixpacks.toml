# Nixpacks configuration for PRINT OS API
# This tells Railway to build from the api/ directory

[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"
startCommand = "npm start"

[build.nixpacksConfig]
# Use Node.js 20 LTS
providers = ["node"]
# Build inside api/ subdirectory
workdir = "api"
# Install dev dependencies for TypeScript build
installCommand = "npm install"
